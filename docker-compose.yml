version: "3"

services: 
  postgres:
    image: postgres:15
    container_name: threads-db
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postrgesql/data
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_DB: threads
      POSTGRES_PASSWORD: postgres
volumes: 
  postgres_data:
